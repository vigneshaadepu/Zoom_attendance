{% extends "base.html" %}
{% block title %}Create Account{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card auth-card-wide">
        <div class="auth-brand">
            <div class="auth-logo">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h1 class="auth-title">Join EduTrack</h1>
            <p class="auth-subtitle">Create your professor account</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form" id="registerForm">
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="form-floating">
                        <input type="text" class="form-control auth-input" id="name" name="name"
                               placeholder="Dr. Jane Smith" required
                               value="{{ name if name is defined else '' }}" />
                        <label for="name"><i class="bi bi-person me-2"></i>Full Name</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-floating">
                        <input type="text" class="form-control auth-input" id="department" name="department"
                               placeholder="Computer Science"
                               value="{{ department if department is defined else '' }}" />
                        <label for="department"><i class="bi bi-building me-2"></i>Department</label>
                    </div>
                </div>
                <div class="col-12">
                    <div class="form-floating">
                        <input type="email" class="form-control auth-input" id="email" name="email"
                               placeholder="professor@university.edu" required autocomplete="email"
                               value="{{ email if email is defined else '' }}" />
                        <label for="email"><i class="bi bi-envelope me-2"></i>Email Address</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-floating">
                        <input type="password" class="form-control auth-input" id="password" name="password"
                               placeholder="Password" required minlength="8" autocomplete="new-password" />
                        <label for="password"><i class="bi bi-lock me-2"></i>Password</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-floating">
                        <input type="password" class="form-control auth-input" id="confirm_password" name="confirm_password"
                               placeholder="Confirm Password" required autocomplete="new-password" />
                        <label for="confirm_password"><i class="bi bi-lock-fill me-2"></i>Confirm Password</label>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn-auth" id="registerBtn">
                    <span class="btn-text"><i class="bi bi-person-plus me-2"></i>Create Account</span>
                    <span class="btn-spinner spinner-border spinner-border-sm d-none"></span>
                </button>
            </div>
        </form>

        <div class="auth-footer">
            <p class="text-muted">Already have an account?
                <a href="{{ url_for('auth.login') }}" class="auth-link">Sign in →</a>
            </p>
        </div>
    </div>
    <div class="auth-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    const pw = document.getElementById('password').value;
    const cpw = document.getElementById('confirm_password').value;
    if (pw !== cpw) {
        e.preventDefault();
        alert('Passwords do not match!');
        return;
    }
    const btn = document.getElementById('registerBtn');
    btn.querySelector('.btn-text').classList.add('d-none');
    btn.querySelector('.btn-spinner').classList.remove('d-none');
    btn.disabled = true;
});
</script>
{% endblock %}
