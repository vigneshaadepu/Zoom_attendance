{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-brand">
            <div class="auth-logo">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <h1 class="auth-title">EduTrack</h1>
            <p class="auth-subtitle">Intelligent Attendance Management</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" id="loginForm">
            <div class="form-floating mb-3">
                <input type="email" class="form-control auth-input" id="email" name="email"
                       placeholder="professor@university.edu" required autocomplete="email" />
                <label for="email"><i class="bi bi-envelope me-2"></i>Email Address</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control auth-input" id="password" name="password"
                       placeholder="Password" required autocomplete="current-password" />
                <label for="password"><i class="bi bi-lock me-2"></i>Password</label>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember" name="remember" />
                    <label class="form-check-label text-muted" for="remember">Remember me</label>
                </div>
            </div>

            <button type="submit" class="btn-auth" id="loginBtn">
                <span class="btn-text"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
                <span class="btn-spinner spinner-border spinner-border-sm d-none"></span>
            </button>
        </form>

        <div class="auth-footer">
            <p class="text-muted">Don't have an account?
                <a href="{{ url_for('auth.register') }}" class="auth-link">Create one →</a>
            </p>
        </div>
    </div>
    <div class="auth-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('loginForm').addEventListener('submit', function() {
    const btn = document.getElementById('loginBtn');
    btn.querySelector('.btn-text').classList.add('d-none');
    btn.querySelector('.btn-spinner').classList.remove('d-none');
    btn.disabled = true;
});
</script>
{% endblock %}
